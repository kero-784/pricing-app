    <script>
        let database = [];
        let entries = [];
        const databaseFileNameLocal = "pricing database.xlsx"; // For local file (same folder)
        const githubDatabaseFileName = "pricing database.xlsx"; // Filename in GitHub repo
        // **IMPORTANT:** Replace with your Google Sheet CSV export URL!
        const googleSheetCsvUrl = "YOUR_GOOGLE_SHEET_CSV_EXPORT_URL_HERE"; //  <======== UPDATE THIS!

        // Function to display a message - unchanged
        function displayMessage(message, isError = false) {
            const messageContainer = document.getElementById('message-container');
            if (!messageContainer) {
                console.error('Error: message-container element not found!');
                return;
            }
            messageContainer.textContent = message;
            messageContainer.className = isError ? 'error' : '';
            messageContainer.style.display = 'block';

            setTimeout(() => {
                messageContainer.style.display = 'none';
            }, 3000);
        }


        // Function to display error messages - unchanged
        function displayError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            if (errorElement) {
                errorElement.textContent = message;
            }
            displayMessage(message, true); // Use displayMessage for errors as well, to show in message container
        }

        function clearError(elementId) { // unchanged
            const errorElement = document.getElementById(elementId);
            if (errorElement) {
                errorElement.textContent = '';
            }
        }

        // Function to add button click animation (unchanged)
        function addButtonClickAnimation(button) { /* ... */ }

        function autoLoadDatabase() {
            console.log('autoLoadDatabase function called - inside autoLoadDatabase()'); // Debug log

            let databaseURL;
            let loadingSource = ''; // To track where we are loading from for messages

            // Check if running on GitHub Pages (or similar hostname pattern)
            if (window.location.hostname.endsWith('.github.io') || window.location.hostname.includes('github.dev')) {
                databaseURL = googleSheetCsvUrl;
                loadingSource = 'Google Sheet';
                console.log("Auto-loading from Google Sheet CSV URL:", databaseURL);
            } else {
                databaseURL = databaseFileNameLocal;
                loadingSource = 'local Excel file';
                console.log("Attempting auto-load from local Excel file:", databaseURL);
            }

            if (!databaseURL) {
                console.error('autoLoadDatabase: No database URL determined.');
                displayError('excelFileError', 'Could not determine database source for auto-load.');
                return;
            }

            displayMessage(`Loading database from ${loadingSource}...`); // Inform user loading started

            const isGoogleSheet = databaseURL === googleSheetCsvUrl;

            fetch(databaseURL)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}, URL: ${databaseURL}`);
                    }
                    return isGoogleSheet ? response.text() : response.arrayBuffer();
                })
                .then(data => {
                    let newDatabase;
                    if (isGoogleSheet) {
                        const parsedCsv = Papa.parse(data, { header: true, skipEmptyLines: true });
                        if (parsedCsv.errors.length > 0) {
                            console.error('CSV Parsing Errors:', parsedCsv.errors);
                            throw new Error('Error parsing Google Sheet CSV data.'); // Throw error to be caught
                        }
                        newDatabase = parsedCsv.data;
                    } else {
                        const workbook = XLSX.read(new Uint8Array(data), { type: 'array', codepage: 65001 });
                        const sheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[sheetName];
                        newDatabase = XLSX.utils.sheet_to_json(worksheet, { raw: false, dateNF: 'yyyy-mm-dd' });
                    }


                    if (newDatabase.length > 0 && (!newDatabase[0].Code || !newDatabase[0].Name || !newDatabase[0]['Supplier Name'])) {
                        throw new Error('Database file must have columns: Code, Name, and Supplier Name.'); // Throw error to be caught
                    }

                    database = newDatabase;
                    saveDatabase();
                    console.log('autoLoadDatabase: Database AUTO-LOADED successfully from:', loadingSource);
                    displayMessage(`Database auto-loaded successfully from ${loadingSource}!`); // Success message
                    updateDatabaseView();
                })
                .catch(error => {
                    console.error('autoLoadDatabase: Error during auto-load from:', loadingSource, error);
                    displayError('excelFileError', `Error auto-loading database from ${loadingSource}: ${error.message}. Please upload manually.`);
                    displayMessage(`Error auto-loading database from ${loadingSource}. Please upload manually.`, true); // Error message
                });
        }

        function updateDatabaseView() { // New function to refresh database view after loading - unchanged
            if (document.getElementById('databasePopup').style.display === 'block') {
                viewDatabase(); // Re-render the database view if popup is open
            }
        }


        // Load initial data when the page loads - unchanged
        window.onload = function () { /* ... */ };

        // uploadExcel function - updated with try-catch and messages
        function uploadExcel() {
            console.log('uploadExcel function called - inside uploadExcel()'); // Debug log
            displayMessage('Uploading Excel file...'); // Inform user upload started
            const uploadButton = document.querySelector('.inline-buttons .btn-primary:nth-child(1)');
            addButtonClickAnimation(uploadButton);
            const fileInput = document.getElementById('excelFile');
            const file = fileInput.files[0];

            clearError('excelFileError');

            if (!file) {
                displayError('excelFileError', 'Please select an Excel file.');
                return;
            }

            const reader = new FileReader();

            reader.onload = function (e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array', codepage: 65001 });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const newDatabase = XLSX.utils.sheet_to_json(worksheet, { raw: false, dateNF: 'yyyy-mm-dd' });

                    if (newDatabase.length > 0 && (!newDatabase[0].Code || !newDatabase[0].Name || !newDatabase[0]['Supplier Name'])) {
                        throw new Error('Excel file must have columns: Code, Name, and Supplier Name.');
                    }

                    database = newDatabase;
                    saveDatabase();
                    console.log('uploadExcel: Database UPLOADED and saved successfully:', database);
                    displayMessage('Database uploaded and saved successfully!'); // Success message
                    updateDatabaseView();
                } catch (error) {
                    console.error('uploadExcel: Error processing Excel file:', error);
                    displayError('excelFileError', `Error processing Excel file: ${error.message}. Please check the file format and content.`);
                    displayMessage('Error processing Excel file. Please check console.', true); // Error message
                }
            };

            reader.onerror = function (e) {
                console.error('uploadExcel: Error reading file:', e); // Log FileReader error
                displayError('excelFileError', 'Error reading the Excel file. Please check the file.');
                displayMessage('Error reading Excel file.', true); // Error message
            };

            reader.readAsArrayBuffer(file);
        }

        // clearDatabase function - updated with confirmation message
        function clearDatabase() {
            console.log('clearDatabase function called - inside clearDatabase()'); // Debug log
            const clearDbButton = document.querySelector('.inline-buttons .btn-danger:nth-child(3)');
            addButtonClickAnimation(clearDbButton);
            if (confirm('Are you sure you want to clear the database? This action cannot be undone.')) {
                database = [];
                try {
                    localStorage.removeItem('pricingDatabase');
                    console.log('clearDatabase: Database CLEARED from localStorage.');
                    displayMessage('Database cleared successfully!'); // Success message
                    updateDatabaseView();
                } catch (error) {
                    console.error('clearDatabase: Error removing database from localStorage:', error);
                    displayMessage('Error clearing database from storage. Please check console.', true); // Error message
                }
            } else {
                displayMessage('Database clear cancelled by user.'); // User cancelled message
            }
        }
